<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸠摩罗什大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        header h1 {
            color: #d4af37;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        header .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        #chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: #d4af37;
            margin-left: 10px;
        }
        .message.assistant .avatar {
            background: #2d4a3e;
            margin-right: 10px;
        }
        .message .content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }
        .message.user .content {
            background: #d4af37;
            color: #1a1a2e;
            border-bottom-right-radius: 5px;
        }
        .message.assistant .content {
            background: rgba(255,255,255,0.1);
            color: #eee;
            border-bottom-left-radius: 5px;
        }
        .input-area {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        #user-input:focus {
            border-color: #d4af37;
            background: rgba(255,255,255,0.15);
        }
        #user-input::placeholder {
            color: #888;
        }
        #send-btn {
            padding: 15px 30px;
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        #send-btn:hover {
            background: #e5c04b;
            transform: scale(1.05);
        }
        #send-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #mic-btn {
            padding: 15px;
            background: #2d4a3e;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #mic-btn:hover {
            background: #3d5a4e;
        }
        #mic-btn.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .message .play-btn {
            display: inline-block;
            margin-left: 10px;
            cursor: pointer;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        .message .play-btn:hover {
            opacity: 1;
        }
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            color: #888;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== 拨打电话模式 ===== */
        #call-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }
        #call-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.6);
        }
        
        /* 通话中遮罩层 */
        #call-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #call-overlay.active {
            display: flex;
        }
        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #2d4a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 30px;
            animation: avatarPulse 2s infinite;
        }
        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
        }
        .call-status {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .call-status.listening {
            color: #e74c3c;
        }
        .call-status.speaking {
            color: #2ecc71;
        }
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 60px;
            margin-bottom: 40px;
        }
        .wave-bar {
            width: 6px;
            height: 20px;
            background: #d4af37;
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { animation-delay: 0.7s; }
        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 50px; }
        }
        .wave-container.hidden .wave-bar {
            animation: none;
            height: 20px;
            opacity: 0.3;
        }
        #end-call-btn {
            padding: 15px 50px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #end-call-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        .call-transcript {
            position: absolute;
            bottom: 150px;
            color: #888;
            font-size: 1rem;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <header>
        <h1>🏛️ 鸠摩罗什大师</h1>
        <div class="subtitle">东晋高僧 · 佛经翻译家</div>
    </header>
    
    <div id="chat-container"></div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <button id="mic-btn" title="按住说话">🎤</button>
            <input type="text" id="user-input" placeholder="请输入您的问题，或按住🎤说话..." autocomplete="off">
            <button id="send-btn">请教</button>
        </div>
    </div>

    <!-- 拨打电话按钮 -->
    <button id="call-btn" title="拨打电话">📞</button>
    
    <!-- 通话中遮罩层 -->
    <div id="call-overlay">
        <div class="call-avatar">🏛️</div>
        <div class="call-status" id="call-status">正在连接...</div>
        <div class="wave-container" id="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="call-transcript" id="call-transcript"></div>
        <button id="end-call-btn">结束通话</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        
        // 持久化sessionId，不同浏览器/设备是不同的
        let sessionId = localStorage.getItem('jiumo_session_id');
        if (!sessionId) {
            sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('jiumo_session_id', sessionId);
        }
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/history?session_id=' + encodeURIComponent(sessionId) + '&limit=20');
                const data = await response.json();
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
            } catch (e) {
                console.log('加载历史失败', e);
            }
        }
        
        // 添加消息
        function addMessage(content, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="avatar">${role === 'assistant' ? '🏛️' : '👤'}</div>
                <div class="content">${content}</div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示加载动画
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="avatar">🏛️</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, 'user');
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, session_id: sessionId})
                });
                
                const data = await response.json();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                hideTyping();
                addMessage('🙏 抱歉，贫衲今日有些疲惫，请稍后再试。', 'assistant');
            }
            
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        // ========== 语音功能 ==========
        
        // 语音识别 (Speech Recognition)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = () => {
                micBtn.classList.add('recording');
                userInput.placeholder = '正在听...';
            };
            
            recognition.onend = () => {
                micBtn.classList.remove('recording');
                userInput.placeholder = '请输入您的问题，或按住🎤说话...';
            };
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                userInput.value = transcript;
            };
            
            // 按住说话
            let isRecording = false;
            micBtn.addEventListener('mousedown', () => {
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                }
            });
            micBtn.addEventListener('mouseup', () => {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
            micBtn.addEventListener('mouseleave', () => {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
            // 移动端触摸支持
            micBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                }
            });
            micBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
        } else {
            micBtn.style.display = 'none';
        }
        
        // 语音合成 (Speech Synthesis) - 朗读鸠摩罗什的回复
        let chineseVoices = [];
        
        // 加载语音列表
        function loadVoices() {
            chineseVoices = window.speechSynthesis.getVoices().filter(v => 
                v.lang.includes('zh') || v.lang.includes('cmn')
            );
        }
        
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();
        
        function speakText(text) {
            if (!window.speechSynthesis) return;
            
            // 停止当前朗读
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.75;  // 更慢
            utterance.pitch = 0.6;  // 更低
            
            // 尝试找一个低沉的中文语音
            if (chineseVoices.length > 0) {
                // 尝试找男声或较深沉的
                utterance.voice = chineseVoices.find(v => 
                    v.name.toLowerCase().includes('male') || 
                    v.name.toLowerCase().includes('国') ||
                    v.name.toLowerCase().includes('普通')
                ) || chineseVoices[0];
            }
            
            window.speechSynthesis.speak(utterance);
        }
        
        // 在回复后添加播放按钮
        const originalAddMessage = addMessage;
        addMessage = function(content, role) {
            originalAddMessage(content, role);
            
            // 如果是鸠摩罗什的回复，添加播放按钮
            if (role === 'assistant') {
                const lastMsg = chatContainer.lastElementChild;
                const playBtn = document.createElement('span');
                playBtn.className = 'play-btn';
                playBtn.textContent = '🔊朗读';
                playBtn.onclick = () => playAudioFromServer(content.replace(/<[^>]+>/g, ''));
                lastMsg.querySelector('.content').appendChild(playBtn);
            }
        };
        
        // 从服务器获取语音并播放
        async function playAudioFromServer(text) {
            try {
                const response = await fetch('/api/tts/speak', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text, session_id: sessionId})
                });
                
                const data = await response.json();
                
                if (data.audio) {
                    // 解码 Base64 音频 - 使用更可靠的方式
                    const binaryString = atob(data.audio);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                    // 创建 Blob 并播放
                    const audioBlob = new Blob([bytes], {type: 'audio/mpeg'});
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                } else if (data.error) {
                    // 回退到浏览器语音
                    console.log('TTS 未配置，回退到浏览器语音');
                    speakText(text);
                }
            } catch (e) {
                console.error('TTS 播放失败', e);
                // 回退到浏览器语音
                speakText(text);
            }
        }
        
        // 事件监听
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // ========== 拨打电话功能 ==========
        const callBtn = document.getElementById('call-btn');
        const callOverlay = document.getElementById('call-overlay');
        const callStatus = document.getElementById('call-status');
        const waveContainer = document.getElementById('wave-container');
        const callTranscript = document.getElementById('call-transcript');
        const endCallBtn = document.getElementById('end-call-btn');
        
        let isInCall = false;
        let callRecognition = null;
        let isListening = false;
        let isSpeaking = false;
        let silenceTimer = null;
        
        // Deepgram 录音相关
        let mediaRecorder = null;
        let audioChunks = [];
        let useDeepgram = true;  // 使用 Deepgram
        
        // 检查 STT 配置
        async function checkSTTConfig() {
            try {
                const response = await fetch('/api/stt/status');
                const data = await response.json();
                useDeepgram = data.deepgram_configured;
                console.log('STT 配置:', data);
            } catch(e) {
                console.log('获取 STT 配置失败，使用浏览器识别');
                useDeepgram = false;
            }
        }
        
        // 使用 Deepgram 进行语音识别
        async function startDeepgramRecognition() {
            try {
                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true
                });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = async (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    // 发送音频到服务器进行识别
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        
                        try {
                            const response = await fetch('/api/stt/transcribe', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ audio: base64, language: 'zh-CN' })
                            });
                            const data = await response.json();
                            
                            if (data.transcript && data.transcript.trim() && !isSpeaking) {
                                const transcript = data.transcript.trim();
                                callTranscript.textContent = transcript;
                                resetSilenceTimer();
                                
                                if (transcript.length > 2) {
                                    handleUserSpeech(transcript);
                                }
                            }
                        } catch(e) {
                            console.log('Deepgram 转录失败', e);
                        }
                    };
                    reader.readAsDataURL(audioBlob);
                    
                    audioChunks = [];
                };
                
                // 每 3 秒发送一次录音
                mediaRecorder.start(3000);
                isListening = true;
                updateCallUI('listening');
                
            } catch(e) {
                console.log('Deepgram 识别初始化失败', e);
                // 回退到浏览器识别
                initCallRecognition();
            }
        }
        
        // 停止 Deepgram 识别
        function stopDeepgramRecognition() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isListening = false;
        }
        
        // 初始化通话语音识别（根据配置选择）
        function initCallRecognition() {
            if (!SpeechRecognition) {
                alert('您的浏览器不支持语音识别功能');
                return false;
            }
            
            callRecognition = new SpeechRecognition();
            callRecognition.continuous = true;  // 持续识别
            callRecognition.interimResults = true;
            callRecognition.lang = 'zh-CN';
            callRecognition.maxAlternatives = 1;
            
            // 开始监听
            callRecognition.onstart = () => {
                isListening = true;
                updateCallUI('listening');
            };
            
            // 识别结果
            callRecognition.onresult = (event) => {
                let transcript = '';
                let isFinal = false;
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        isFinal = true;
                    }
                }
                
                // 只有在 Bot 不在说话时，才处理麦克风输入
                // 这样 Bot 说的话不会被误识别
                if (transcript.trim() && !isSpeaking) {
                    callTranscript.textContent = transcript;
                    resetSilenceTimer();
                    
                    if (isFinal && transcript.trim().length > 2) {
                        // 用户说完一句话，处理发送
                        clearTimeout(silenceTimer);
                        handleUserSpeech(transcript.trim());
                    }
                } else if (isSpeaking) {
                    // Bot 正在说话，静音处理，不显示
                    console.log('Bot说话中，忽略麦克风输入');
                }
            };
            
            // 识别结束（自动重新开始）
            callRecognition.onend = () => {
                if (isInCall && !isSpeaking) {
                    // 如果通话中且没有在说话，重新开始监听
                    try {
                        callRecognition.start();
                    } catch(e) {
                        console.log('重新启动识别失败', e);
                    }
                }
            };
            
            callRecognition.onerror = (event) => {
                console.log('识别错误:', event.error);
                if (event.error === 'no-speech') {
                    // 没有语音输入，重新开始监听
                } else if (isInCall) {
                    // 其他错误，重试
                    setTimeout(() => {
                        if (isInCall && !isSpeaking) {
                            try { callRecognition.start(); } catch(e) {}
                        }
                    }, 1000);
                }
            };
            
            return true;
        }
        
        // 重置静音计时器
        function resetSilenceTimer() {
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => {
                // 用户停止说话一段时间后，发送当前输入
                const text = callTranscript.textContent.trim();
                if (text && text.length > 2) {
                    handleUserSpeech(text);
                }
            }, 1500);  // 1.5秒静音后发送
        }
        
        // 处理用户语音输入
        async function handleUserSpeech(text) {
            if (!text || isSpeaking) return;
            
            // 👏 中途打断：用户开始说话，立即停止当前AI语音
            if (window.speechSynthesis && isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
            }
            
            // 停止识别
            try { callRecognition.stop(); } catch(e) {}
            isListening = false;
            
            // 显示用户说的话
            addMessage(text, 'user');
            callTranscript.textContent = '';
            
            // 等待鸠摩罗什回复
            showTyping();
            updateCallUI('thinking');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text, session_id: sessionId})
                });
                
                const data = await response.json();
                hideTyping();
                
                // 显示鸠摩罗什的回复
                addMessage(data.reply, 'assistant');
                
                // 自动语音播放
                await speakAndWait(data.reply);
                
                // 播放完毕，继续监听
                if (isInCall) {
                    updateCallUI('listening');
                    try { callRecognition.start(); } catch(e) {}
                }
            } catch (error) {
                hideTyping();
                addMessage('🙏 抱歉，贫衲今日有些疲惫，请稍后再试。', 'assistant');
                if (isInCall) {
                    setTimeout(() => {
                        try { callRecognition.start(); } catch(e) {}
                    }, 1000);
                }
            }
        }
        
        // 语音播放并等待完成 - 使用服务器 TTS
        async function speakAndWait(text) {
            return new Promise(async (resolve) => {
                isSpeaking = true;
                updateCallUI('speaking');
                
                // Bot 说话时暂停录音
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.pause();
                }
                
                try {
                    const response = await fetch('/api/tts/speak', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: text, session_id: sessionId})
                    });
                    
                    const data = await response.json();
                    
                    if (data.audio) {
                        // 解码 Base64 音频 - 使用更可靠的方式
                        const binaryString = atob(data.audio);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        
                        // 根据格式创建 Blob 并播放
                        const audioFormat = data.format || 'mp3';
                        const audioBlob = new Blob([bytes], {type: 'audio/mpeg'});
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const audio = new Audio(audioUrl);
                        
                        audio.onended = () => {
                            isSpeaking = false;
                            // Bot 说完后恢复录音
                            if (mediaRecorder && mediaRecorder.state === 'paused') {
                                mediaRecorder.resume();
                            }
                            resolve();
                        };
                        
                        audio.onerror = (e) => {
                            console.log('音频播放错误', e);
                            isSpeaking = false;
                            // Bot 说完后恢复录音
                            if (mediaRecorder && mediaRecorder.state === 'paused') {
                                mediaRecorder.resume();
                            }
                            resolve();
                        };
                        
                        audio.play();
                    } else {
                        // 回退到浏览器语音
                        console.log('TTS 未配置，回退到浏览器语音');
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'zh-CN';
                        utterance.rate = 0.8;
                        utterance.pitch = 0.6;
                        utterance.onend = () => { isSpeaking = false; resolve(); };
                        utterance.onerror = () => { isSpeaking = false; resolve(); };
                        window.speechSynthesis.speak(utterance);
                    }
                } catch (e) {
                    console.error('TTS 请求失败', e);
                    isSpeaking = false;
                    resolve();
                }
            });
        }
        
        // 更新通话UI状态
        function updateCallUI(status) {
            waveContainer.classList.remove('hidden');
            
            switch(status) {
                case 'listening':
                    callStatus.textContent = '正在倾听...';
                    callStatus.className = 'call-status listening';
                    break;
                case 'thinking':
                    callStatus.textContent = '贫衲正在思考...';
                    callStatus.className = 'call-status';
                    break;
                case 'speaking':
                    callStatus.textContent = '鸠摩罗什正在讲话...';
                    callStatus.className = 'call-status speaking';
                    break;
                default:
                    callStatus.textContent = status;
            }
        }
        
        // 开始通话
        async function startCall() {
            if (isInCall) return;
            
            // 先检查 STT 配置
            await checkSTTConfig();
            
            isInCall = true;
            callOverlay.classList.add('active');
            callStatus.textContent = '正在连接...';
            callTranscript.textContent = '';
            
            if (useDeepgram) {
                // 使用 Deepgram
                await startDeepgramRecognition();
            } else {
                // 使用浏览器识别
                if (!SpeechRecognition) {
                    alert('您的浏览器不支持语音识别，请使用Chrome或Edge浏览器');
                    endCall();
                    return;
                }
                
                if (!initCallRecognition()) {
                    endCall();
                    return;
                }
                
                try {
                    callRecognition.start();
                } catch(e) {
                    console.log('启动识别失败', e);
                    setTimeout(() => {
                        try { callRecognition.start(); } catch(e2) {
                            alert('无法启动语音识别，请检查麦克风权限');
                            endCall();
                        }
                    }, 500);
                }
            }
        }
        
        // 结束通话
        function endCall() {
            isInCall = false;
            
            // 停止识别
            if (useDeepgram) {
                stopDeepgramRecognition();
            } else if (callRecognition) {
                try { callRecognition.stop(); } catch(e) {}
            }
            isListening = false;
            clearTimeout(silenceTimer);
            
            // 停止语音
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            isSpeaking = false;
            
            // 隐藏遮罩
            callOverlay.classList.remove('active');
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 通话按钮事件
        callBtn.addEventListener('click', startCall);
        endCallBtn.addEventListener('click', endCall);
        
        // 中途打断：用户开始说话时停止AI语音
        // 注意：这个功能通过 resetSilenceTimer 中检测到新输入时处理
        
        // 欢迎消息或加载历史
        window.onload = async () => {
            await loadHistory();
            // 如果没有历史，显示欢迎消息
            if (chatContainer.children.length === 0) {
                addMessage('阿弥陀佛，善哉善哉。施主远道而来，贫衲有礼了。<br><br>有何困惑，尽管道来。', 'assistant');
            }
        };
    </script>
</body>
