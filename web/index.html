<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸠摩罗什大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        header h1 {
            color: #d4af37;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        header .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        #chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: #d4af37;
            margin-left: 10px;
        }
        .message.assistant .avatar {
            background: #2d4a3e;
            margin-right: 10px;
        }
        .message .content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }
        .message.user .content {
            background: #d4af37;
            color: #1a1a2e;
            border-bottom-right-radius: 5px;
        }
        .message.assistant .content {
            background: rgba(255,255,255,0.1);
            color: #eee;
            border-bottom-left-radius: 5px;
        }
        .input-area {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        #user-input:focus {
            border-color: #d4af37;
            background: rgba(255,255,255,0.15);
        }
        #user-input::placeholder {
            color: #888;
        }
        #send-btn {
            padding: 15px 30px;
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        #send-btn:hover {
            background: #e5c04b;
            transform: scale(1.05);
        }
        #send-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #mic-btn {
            padding: 15px;
            background: #2d4a3e;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #mic-btn:hover {
            background: #3d5a4e;
        }
        #mic-btn.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .message .play-btn {
            display: inline-block;
            margin-left: 10px;
            cursor: pointer;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        .message .play-btn:hover {
            opacity: 1;
        }
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            color: #888;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== 拨打电话模式 ===== */
        #call-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }
        #call-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.6);
        }
        
        /* 通话中遮罩层 */
        #call-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #call-overlay.active {
            display: flex;
        }
        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #2d4a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 30px;
            animation: avatarPulse 2s infinite;
        }
        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
        }
        .call-status {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .call-status.listening {
            color: #e74c3c;
        }
        .call-status.speaking {
            color: #2ecc71;
        }
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 60px;
            margin-bottom: 40px;
        }
        .wave-bar {
            width: 6px;
            height: 20px;
            background: #d4af37;
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { animation-delay: 0.7s; }
        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 50px; }
        }
        .wave-container.hidden .wave-bar {
            animation: none;
            height: 20px;
            opacity: 0.3;
        }
        #end-call-btn {
            padding: 15px 50px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #end-call-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        .call-transcript {
            position: absolute;
            bottom: 150px;
            color: #888;
            font-size: 1rem;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <header>
        <h1>🏛️ 鸠摩罗什大师</h1>
        <div class="subtitle">东晋高僧 · 佛经翻译家</div>
    </header>
    
    <div id="chat-container"></div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <button id="mic-btn" title="按住说话">🎤</button>
            <input type="text" id="user-input" placeholder="请输入您的问题，或按住🎤说话..." autocomplete="off">
            <button id="send-btn">请教</button>
        </div>
    </div>

    <!-- 拨打电话按钮 -->
    <button id="call-btn" title="拨打电话">📞</button>
    
    <!-- 通话中遮罩层 -->
    <div id="call-overlay">
        <div class="call-avatar">🏛️</div>
        <div class="call-status" id="call-status">正在连接...</div>
        <div class="wave-container" id="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="call-transcript" id="call-transcript"></div>
        <button id="end-call-btn">结束通话</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        
        // 持久化sessionId，不同浏览器/设备是不同的
        let sessionId = localStorage.getItem('jiumo_session_id');
        if (!sessionId) {
            sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('jiumo_session_id', sessionId);
        }
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch('/api/history?session_id=' + encodeURIComponent(sessionId) + '&limit=20');
                const data = await response.json();
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
            } catch (e) {
                console.log('加载历史失败', e);
            }
        }
        
        // 添加消息
        function addMessage(content, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="avatar">${role === 'assistant' ? '🏛️' : '👤'}</div>
                <div class="content">${content}</div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示加载动画
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="avatar">🏛️</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            userInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(message, 'user');
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, session_id: sessionId})
                });
                
                const data = await response.json();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                hideTyping();
                addMessage('🙏 抱歉，贫衲今日有些疲惫，请稍后再试。', 'assistant');
            }
            
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        // ========== 语音功能 ==========
        
        // 语音识别 (Speech Recognition)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = () => {
                micBtn.classList.add('recording');
                userInput.placeholder = '正在听...';
            };
            
            recognition.onend = () => {
                micBtn.classList.remove('recording');
                userInput.placeholder = '请输入您的问题，或按住🎤说话...';
            };
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                userInput.value = transcript;
            };
            
            // 按住说话
            let isRecording = false;
            micBtn.addEventListener('mousedown', () => {
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                }
            });
            micBtn.addEventListener('mouseup', () => {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
            micBtn.addEventListener('mouseleave', () => {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
            // 移动端触摸支持
            micBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                }
            });
            micBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                }
            });
        } else {
            micBtn.style.display = 'none';
        }
        
        // 语音合成 (Speech Synthesis) - 朗读鸠摩罗什的回复
        let chineseVoices = [];
        
        // 加载语音列表
        function loadVoices() {
            chineseVoices = window.speechSynthesis.getVoices().filter(v => 
                v.lang.includes('zh') || v.lang.includes('cmn')
            );
        }
        
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();
        
        function speakText(text) {
            // 使用阿里云百炼 TTS 后端接口
            fetch('/api/tts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})  // 使用 message 字段
            })
            .then(response => {
                if (!response.ok) throw new Error('TTS failed');
                return response.json();
            })
            .then(data => {
                // 解析 JSON 响应，包含 base64 音频
                if (data.audio) {
                    const audioBytes = atob(data.audio);
                    const arrayBuffer = new ArrayBuffer(audioBytes.length);
                    const uint8Array = new Uint8Array(arrayBuffer);
                    for (let i = 0; i < audioBytes.length; i++) {
                        uint8Array[i] = audioBytes.charCodeAt(i);
                    }
                    const blob = new Blob([uint8Array], {type: 'audio/wav'});
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    audio.onended = () => URL.revokeObjectURL(audioUrl);
                } else {
                    throw new Error('No audio data');
                }
            })
            .catch(err => {
                console.error('TTS error:', err);
                // 回退到浏览器原生 TTS
                fallbackSpeak(text);
            });
        }
        
        // 浏览器原生 TTS 回退
        function fallbackSpeak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.75;
            utterance.pitch = 0.6;
            
            if (chineseVoices.length > 0) {
                utterance.voice = chineseVoices.find(v => 
                    v.name.toLowerCase().includes('male') || 
                    v.name.toLowerCase().includes('国') ||
                    v.name.toLowerCase().includes('普通')
                ) || chineseVoices[0];
            }
            
            window.speechSynthesis.speak(utterance);
        }
        
        // 在回复后添加播放按钮
        const originalAddMessage = addMessage;
        addMessage = function(content, role) {
            originalAddMessage(content, role);
            
            // 如果是鸠摩罗什的回复，添加播放按钮
            if (role === 'assistant') {
                const lastMsg = chatContainer.lastElementChild;
                const playBtn = document.createElement('span');
                playBtn.className = 'play-btn';
                playBtn.textContent = '🔊朗读';
                playBtn.onclick = () => speakText(content.replace(/<[^>]+>/g, ''));
                lastMsg.querySelector('.content').appendChild(playBtn);
            }
        };
        
        // 事件监听
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // ========== 拨打电话功能 ==========
        const callBtn = document.getElementById('call-btn');
        const callOverlay = document.getElementById('call-overlay');
        const callStatus = document.getElementById('call-status');
        const waveContainer = document.getElementById('wave-container');
        const callTranscript = document.getElementById('call-transcript');
        const endCallBtn = document.getElementById('end-call-btn');
        
        let isInCall = false;
        let callRecognition = null;
        let isListening = false;
        let isSpeaking = false;
        let silenceTimer = null;
        
        // 初始化通话语音识别 - 使用 Deepgram
        let mediaRecorder = null;
        let audioChunks = [];
        let deepgramWs = null;
        
        function initCallRecognition() {
            // 使用 MediaRecorder + Deepgram
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('您的浏览器不支持录音功能');
                return false;
            }
            
            return true;
        }
        
        // 开始 Deepgram 识别
        async function startDeepgramRecognition() {
            try {
                // 获取麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 创建 MediaRecorder
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                audioChunks = [];
                
                mediaRecorder.ondataavailable = async (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                        
                        // 转换为 base64 并发送到后端识别
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            const base64 = reader.result.split(',')[1];
                            try {
                                const response = await fetch('/api/stt/transcribe', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({audio: base64})
                                });
                                const result = await response.json();
                                
                                if (result.transcript && result.transcript.trim()) {
                                    const transcript = result.transcript.trim();
                                    console.log('识别到:', transcript);
                                    callTranscript.textContent = transcript;
                                    
                                    // 如果识别结果稳定，发送
                                    if (transcript.length > 2) {
                                        handleUserSpeech(transcript);
                                    }
                                }
                            } catch (e) {
                                console.log('识别请求失败', e);
                            }
                        };
                        reader.readAsDataURL(event.data);
                    }
                };
                
                // 每2秒发送一次音频进行识别
                mediaRecorder.start(2000);
                
                isListening = true;
                updateCallUI('listening');
                return true;
                
            } catch (e) {
                console.log('启动 Deepgram 识别失败', e);
                alert('无法启动录音，请检查麦克风权限');
                return false;
            }
        }
        
        // 停止 Deepgram 识别
        function stopDeepgramRecognition() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                // 停止所有轨道
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isListening = false;
        }
        
        // 重置静音计时器
        function resetSilenceTimer() {
            clearTimeout(silenceTimer);
        }
        
        // 处理用户语音输入
        let isProcessingSpeech = false;  // 防止重复处理
        
        async function handleUserSpeech(text) {
            if (!text || isSpeaking || isProcessingSpeech) return;
            isProcessingSpeech = true;
            
            // 👏 中途打断：用户开始说话，立即停止当前AI语音
            if (window.speechSynthesis && isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
            }
            
            // 停止 Deepgram 识别
            stopDeepgramRecognition();
            isListening = false;
            
            // 显示用户说的话
            addMessage(text, 'user');
            callTranscript.textContent = '';
            
            // 等待鸠摩罗什回复
            showTyping();
            updateCallUI('thinking');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text, session_id: sessionId})
                });
                
                const data = await response.json();
                hideTyping();
                
                // 显示鸠摩罗什的回复
                addMessage(data.reply, 'assistant');
                
                // 自动语音播放
                await speakAndWait(data.reply);
                
                // 播放完毕，继续监听
                if (isInCall) {
                    updateCallUI('listening');
                    await startDeepgramRecognition();
                }
            } catch (error) {
                hideTyping();
                addMessage('🙏 抱歉，贫衲今日有些疲惫，请稍后再试。', 'assistant');
                if (isInCall) {
                    setTimeout(() => {
                        startDeepgramRecognition();
                    }, 1000);
                }
            } finally {
                isProcessingSpeech = false;
            }
        }
        
        // 语音播放并等待完成 (通话模式)
        function speakAndWait(text) {
            return new Promise((resolve) => {
                isSpeaking = true;
                updateCallUI('speaking');
                
                // 使用阿里云百炼 TTS 后端接口
                fetch('/api/tts', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                })
                .then(response => {
                    if (!response.ok) throw new Error('TTS failed');
                    return response.json();
                })
                .then(data => {
                    if (data.audio) {
                        const audioBytes = atob(data.audio);
                        const arrayBuffer = new ArrayBuffer(audioBytes.length);
                        const uint8Array = new Uint8Array(arrayBuffer);
                        for (let i = 0; i < audioBytes.length; i++) {
                            uint8Array[i] = audioBytes.charCodeAt(i);
                        }
                        const blob = new Blob([uint8Array], {type: 'audio/wav'});
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        
                        audio.onended = () => {
                            isSpeaking = false;
                            URL.revokeObjectURL(audioUrl);
                            resolve();
                        };
                        
                        audio.onerror = () => {
                            isSpeaking = false;
                            // 回退到浏览器 TTS
                            fallbackSpeakCall(text, resolve);
                        };
                        
                        audio.play();
                    } else {
                        throw new Error('No audio data');
                    }
                })
                .catch(err => {
                    console.error('TTS error:', err);
                    // 回退到浏览器 TTS
                    fallbackSpeakCall(text, resolve);
                });
            });
        }
        
        // 通话模式浏览器原生 TTS 回退
        function fallbackSpeakCall(text, resolve) {
            if (!window.speechSynthesis) {
                isSpeaking = false;
                resolve();
                return;
            }
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            utterance.pitch = 0.6;
            
            if (chineseVoices.length > 0) {
                utterance.voice = chineseVoices.find(v => 
                    v.name.toLowerCase().includes('male') || 
                    v.name.toLowerCase().includes('国') ||
                    v.name.toLowerCase().includes('普通')
                ) || chineseVoices[0];
            }
                
            utterance.onstart = () => {
                // 可以在这里显示"正在说话"
            };
            
            utterance.onend = () => {
                isSpeaking = false;
                resolve();
            };
            
            utterance.onerror = (e) => {
                console.log('语音播放错误', e);
                isSpeaking = false;
                resolve();
            };
            
            window.speechSynthesis.speak(utterance);
        }
        
        // 更新通话UI状态
        function updateCallUI(status) {
            waveContainer.classList.remove('hidden');
            
            switch(status) {
                case 'listening':
                    callStatus.textContent = '正在倾听...';
                    callStatus.className = 'call-status listening';
                    break;
                case 'thinking':
                    callStatus.textContent = '贫衲正在思考...';
                    callStatus.className = 'call-status';
                    break;
                case 'speaking':
                    callStatus.textContent = '鸠摩罗什正在讲话...';
                    callStatus.className = 'call-status speaking';
                    break;
                default:
                    callStatus.textContent = status;
            }
        }
        
        // 开始通话 - 使用 Deepgram
        async function startCall() {
            if (isInCall) return;
            
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('您的浏览器不支持录音功能，请使用Chrome或Edge浏览器');
                return;
            }
            
            // 停止之前的识别器
            stopDeepgramRecognition();
            
            isInCall = true;
            callOverlay.classList.add('active');
            callStatus.textContent = '正在连接...';
            callTranscript.textContent = '';
            isProcessingSpeech = false;
            
            // 初始化识别器
            if (!initCallRecognition()) {
                endCall();
                return;
            }
            
            // 开始 Deepgram 识别
            const success = await startDeepgramRecognition();
            if (!success) {
                endCall();
                return;
            }
            
            callStatus.textContent = '请说话...';
        }
                }, 500);
            }
        }
        
        // 结束通话
        function endCall() {
            isInCall = false;
            
            // 停止 Deepgram 识别
            stopDeepgramRecognition();
            isListening = false;
            clearTimeout(silenceTimer);
            
            // 停止语音
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            isSpeaking = false;
            
            // 隐藏遮罩
            callOverlay.classList.remove('active');
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 通话按钮事件
        callBtn.addEventListener('click', startCall);
        endCallBtn.addEventListener('click', endCall);
        
        // 中途打断：用户开始说话时停止AI语音
        // 注意：这个功能通过 resetSilenceTimer 中检测到新输入时处理
        
        // 欢迎消息或加载历史
        window.onload = async () => {
            await loadHistory();
            // 如果没有历史，显示欢迎消息
            if (chatContainer.children.length === 0) {
                addMessage('阿弥陀佛，善哉善哉。施主远道而来，贫衲有礼了。<br><br>有何困惑，尽管道来。', 'assistant');
            }
        };
    </script>
